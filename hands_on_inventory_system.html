
<h2 class="sr-only">Hands-on session inventory system with stock tracking for Molars, Full Arch, and Device categories</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{padding:1rem 0 2rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:8px;flex-wrap:wrap}
.topbar-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.topbar-right{display:flex;gap:8px;align-items:center}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px}
.stat-lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-val.s-ok{color:#0F6E56}.stat-val.s-low{color:#BA7517}.stat-val.s-out{color:#A32D2D}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:140px}
.filter-bar select{min-width:130px}
.section-hdr{display:flex;align-items:center;gap:8px;padding:10px 0 6px;border-bottom:0.5px solid var(--color-border-secondary);margin-bottom:2px}
.section-lbl{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase}
.section-count{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:1px 7px;border-radius:10px}
.col-hdr{display:grid;grid-template-columns:1fr 110px 100px 90px 80px 30px;gap:8px;padding:4px 6px;margin-bottom:2px}
.col-lbl{font-size:11px;color:var(--color-text-tertiary);font-weight:500}
.row{display:grid;grid-template-columns:1fr 110px 100px 90px 80px 30px;gap:8px;align-items:center;padding:7px 6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.row:last-child{border-bottom:none}
.row:hover{background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.item-info .name{font-size:13px;color:var(--color-text-primary);font-weight:500;line-height:1.3}
.item-info .ref{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono)}
.qty-ctrl{display:flex;align-items:center;gap:3px}
.qb{background:none;border:0.5px solid var(--color-border-secondary);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:14px;color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.qb:hover{background:var(--color-background-secondary)}
.qnum{font-size:14px;font-weight:500;min-width:34px;text-align:center;color:var(--color-text-primary)}
.max-input{width:80px;font-size:13px;padding:3px 6px;height:26px;text-align:center}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--border-radius-md);text-align:center;white-space:nowrap}
.b-ok{background:#E1F5EE;color:#085041}.b-low{background:#FAEEDA;color:#854F0B}.b-out{background:#FCEBEB;color:#791F1F}.b-rcv{background:#E6F1FB;color:#0C447C}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:15px;display:flex;align-items:center;justify-content:center;padding:0}
.del-btn:hover{color:#A32D2D}
.log-section{margin-top:2rem;border-top:0.5px solid var(--color-border-tertiary);padding-top:1.25rem}
.log-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.log-row{display:grid;grid-template-columns:90px 1fr 70px 70px;gap:8px;padding:5px 6px;font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary);align-items:center}
.log-row:last-child{border-bottom:none}
.log-time{color:var(--color-text-tertiary);font-family:var(--font-mono)}
.log-name{color:var(--color-text-primary)}
.log-chg{font-weight:500;text-align:center}
.log-chg.pos{color:#0F6E56}.log-chg.neg{color:#A32D2D}
.log-new{color:var(--color-text-secondary);text-align:center}
.empty{font-size:13px;color:var(--color-text-tertiary);padding:12px 6px}
.add-row{display:grid;grid-template-columns:1fr 90px 90px 90px auto;gap:8px;align-items:center;padding:8px 6px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-top:1rem}
.add-row input,select{height:30px;font-size:13px}
</style>

<div class="app">
<div class="topbar">
  <span class="topbar-title"><i class="ti ti-package" aria-hidden="true" style="margin-right:8px;font-size:18px;vertical-align:-2px"></i>Hands-on session inventory</span>
  <div class="topbar-right">
    <button onclick="exportCSV()" style="font-size:13px"><i class="ti ti-download" aria-hidden="true" style="margin-right:4px"></i>Export CSV</button>
    <button onclick="resetAll()" style="font-size:13px;color:var(--color-text-secondary)"><i class="ti ti-refresh" aria-hidden="true" style="margin-right:4px"></i>Reset</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filter-bar">
  <input type="text" id="search" placeholder="Search item or ref code…" oninput="render()"/>
  <select id="catFilter" onchange="render()">
    <option value="">All sessions</option>
    <option value="Molars">Molars session</option>
    <option value="Full Arch">Full arch session</option>
    <option value="Devices">Devices</option>
  </select>
  <select id="statusFilter" onchange="render()">
    <option value="">All statuses</option>
    <option value="ok">In stock</option>
    <option value="low">Low stock</option>
    <option value="out">Out of stock</option>
  </select>
</div>

<div id="list"></div>

<div class="add-row" id="addRow">
  <input type="text" id="nName" placeholder="Item name…" onkeydown="if(event.key==='Enter')addItem()"/>
  <input type="text" id="nRef" placeholder="Ref code" style="width:100px"/>
  <input type="number" id="nQty" value="0" min="0" style="width:70px;text-align:center"/>
  <select id="nCat" style="width:110px">
    <option>Molars</option>
    <option>Full Arch</option>
    <option>Devices</option>
  </select>
  <button onclick="addItem()" style="white-space:nowrap;font-size:13px"><i class="ti ti-plus" aria-hidden="true" style="margin-right:4px"></i>Add</button>
</div>

<div class="log-section">
  <div class="log-title"><i class="ti ti-history" aria-hidden="true" style="font-size:16px"></i>Session log</div>
  <div class="col-hdr" style="grid-template-columns:90px 1fr 70px 70px">
    <span class="col-lbl">Time</span><span class="col-lbl">Item</span><span class="col-lbl">Change</span><span class="col-lbl">New qty</span>
  </div>
  <div id="log"></div>
</div>
</div>

<script>
const INIT = [
  {id:1,name:'BDC model',ref:'KARO3003',qty:80,max:80,cat:'Molars',received:false},
  {id:2,name:'AnyRidge full kit',ref:'KARIN3001',qty:20,max:20,cat:'Molars',received:true},
  {id:3,name:'Blue Diamond full kit',ref:'KARO3001',qty:20,max:20,cat:'Molars',received:true},
  {id:4,name:'IW molar kit (BD and AR)',ref:'MKMIS3000L',qty:20,max:20,cat:'Molars',received:false},
  {id:5,name:'AnyRidge FX',ref:'AR384510C',qty:110,max:120,cat:'Molars',received:false},
  {id:6,name:'AnyRidge FX',ref:'AR385510C',qty:120,max:120,cat:'Molars',received:false},
  {id:7,name:'AnyRidge FX',ref:'FALIHX8008C',qty:120,max:120,cat:'Molars',received:true},
  {id:8,name:'Blue Diamond FX',ref:'ARO4410DC',qty:120,max:120,cat:'Molars',received:true},
  {id:9,name:'Blue Diamond FX',ref:'ARO5310DC',qty:120,max:120,cat:'Molars',received:true},
  {id:10,name:'Blue Diamond FX',ref:'ARO7310DC',qty:120,max:120,cat:'Molars',received:false},
  {id:11,name:'Blue Diamond Cuff FX',ref:'BDC440704DC',qty:63,max:120,cat:'Molars',received:false},
  {id:12,name:'Blue Diamond Cuff FX',ref:'BDC530504DC',qty:32,max:120,cat:'Molars',received:false},
  {id:13,name:'Blue Diamond Cuff FX',ref:'BDC730504DC',qty:120,max:120,cat:'Molars',received:false},
  {id:14,name:'AnyRidge anatomical healing abutment kit',ref:'C-AHAR05NP',qty:20,max:20,cat:'Molars',received:false},
  {id:15,name:'BlueDiamond anatomical healing abutment kit',ref:'C-AHBD05NP',qty:20,max:20,cat:'Molars',received:false},
  {id:16,name:'ZBLC kit BlueDiamond',ref:'KZBLCBD3000',qty:20,max:20,cat:'Molars',received:true},
  {id:17,name:'ZR-Gen S2',ref:'ARZXM503838L',qty:13,max:120,cat:'Molars',received:false},
  {id:18,name:'ZR-Gen BD',ref:'ZGRB4538.MTN',qty:120,max:120,cat:'Molars',received:true},
  {id:19,name:'Mega TCP bone / Bone Matrix I',ref:'BM10301',qty:120,max:120,cat:'Molars',received:false},
  {id:20,name:'Full mouth model',ref:'EM-FM2',qty:80,max:80,cat:'Full Arch',received:false},
  {id:21,name:'ARi D4.0/ T7/ C4',ref:'H-DHARIE324074M',qty:120,max:120,cat:'Full Arch',received:false},
  {id:22,name:'BD D4.1/ L11.5',ref:'H-DHARO4111',qty:120,max:120,cat:'Full Arch',received:false},
  {id:23,name:'BD D4.1/ L18',ref:'H-DHARO4118',qty:120,max:120,cat:'Full Arch',received:false},
  {id:24,name:'ARi D3.5/ T7/ C4',ref:'H-DHARIE323574M',qty:120,max:120,cat:'Full Arch',received:false},
  {id:25,name:'BDC D4.1/ T9/ C2',ref:'H-DHBDC410902',qty:120,max:120,cat:'Full Arch',received:false},
  {id:26,name:'ARi AXA 00',ref:'H-AXARIN43400C',qty:20,max:120,cat:'Full Arch',received:false},
  {id:27,name:'ARi AXA 12',ref:'H-AXARIN43410C',qty:120,max:120,cat:'Full Arch',received:true},
  {id:28,name:'ARi AXA 20',ref:'H-AXARIN43420TC',qty:72,max:120,cat:'Full Arch',received:false},
  {id:29,name:'BD AXA 30',ref:'H-AXBDRS53430TC',qty:120,max:120,cat:'Full Arch',received:true},
  {id:30,name:'BD AXA 20',ref:'H-AXBDRS53420TC',qty:120,max:120,cat:'Full Arch',received:true},
  {id:31,name:'L=10/ AXA',ref:'AXASB10T',qty:80,max:80,cat:'Full Arch',received:false},
  {id:32,name:'L=15/ AXA',ref:'AXASB15T',qty:40,max:40,cat:'Full Arch',received:false},
  {id:33,name:'Blue Diamond Guide kit',ref:'MKAXSBD3000L',qty:10,max:10,cat:'Full Arch',received:true},
  {id:34,name:'Ari Guide kit',ref:'MKAXSARI3000L',qty:10,max:10,cat:'Full Arch',received:true},
  {id:35,name:'Ari surgical kit',ref:'MKARI3000M',qty:20,max:20,cat:'Full Arch',received:true},
  {id:36,name:'Meg Engine Eco.',ref:'-',qty:20,max:20,cat:'Devices',received:true},
  {id:37,name:'R2i5',ref:'-',qty:10,max:10,cat:'Devices',received:false},
  {id:38,name:'R2 Photogram',ref:'-',qty:10,max:10,cat:'Devices',received:false},
];

let items = JSON.parse(JSON.stringify(INIT));
let nextId = 39;
let log = [];

function lowThreshold(item){ return Math.ceil(item.max * 0.25); }
function getStatus(item){
  if(item.qty===0) return 'out';
  if(item.qty <= lowThreshold(item)) return 'low';
  return 'ok';
}
function statusLabel(s){ return s==='ok'?'In stock':s==='low'?'Low stock':'Out of stock'; }
function fmtTime(d){ return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

function changeQty(id, delta){
  const item = items.find(x=>x.id===id);
  if(!item) return;
  const prev = item.qty;
  item.qty = Math.max(0, item.qty + delta);
  if(item.qty !== prev){
    log.unshift({time:new Date(),name:item.name,ref:item.ref,prev,next:item.qty,delta:item.qty-prev});
    if(log.length>50) log.pop();
  }
  render();
}

function setMax(id, val){
  const item = items.find(x=>x.id===id);
  if(item) item.max = Math.max(0, parseInt(val)||0);
  render();
}

function setQtyDirect(id, val){
  const item = items.find(x=>x.id===id);
  if(!item) return;
  const prev = item.qty;
  const next = Math.max(0, parseInt(val)||0);
  item.qty = next;
  if(next !== prev){
    log.unshift({time:new Date(),name:item.name,ref:item.ref,prev,next,delta:next-prev});
    if(log.length>50) log.pop();
  }
  render();
}

function delItem(id){
  items = items.filter(x=>x.id!==id);
  render();
}

function addItem(){
  const name = document.getElementById('nName').value.trim();
  if(!name) return;
  const ref = document.getElementById('nRef').value.trim()||'-';
  const qty = parseInt(document.getElementById('nQty').value)||0;
  const cat = document.getElementById('nCat').value;
  items.push({id:nextId++,name,ref,qty,max:qty||120,cat,received:false});
  document.getElementById('nName').value='';
  document.getElementById('nRef').value='';
  document.getElementById('nQty').value='0';
  render();
}

function resetAll(){
  if(!confirm('Reset all quantities to original values?')) return;
  items = JSON.parse(JSON.stringify(INIT));
  log=[];
  render();
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const catF = document.getElementById('catFilter').value;
  const statF = document.getElementById('statusFilter').value;

  let filtered = items.filter(i=>{
    const matchS = !search || i.name.toLowerCase().includes(search) || i.ref.toLowerCase().includes(search);
    const matchC = !catF || i.cat===catF;
    const matchSt = !statF || getStatus(i)===statF;
    return matchS && matchC && matchSt;
  });

  const cats = ['Molars','Full Arch','Devices'];
  let html = '';

  const colHdr = `<div class="col-hdr"><span class="col-lbl">Product / ref code</span><span class="col-lbl" style="text-align:center">In stock</span><span class="col-lbl" style="text-align:center">Target qty</span><span class="col-lbl" style="text-align:center">Status</span><span class="col-lbl"></span><span class="col-lbl"></span></div>`;

  cats.forEach(cat=>{
    const group = filtered.filter(i=>i.cat===cat);
    if(!group.length) return;
    html += `<div style="margin-bottom:1.25rem">`;
    const catLabel = cat==='Molars'?'Molars hands-on session':cat==='Full Arch'?'Full arch hands-on session':'Device list';
    html += `<div class="section-hdr"><span class="section-lbl">${catLabel}</span><span class="section-count">${group.length} items</span></div>`;
    html += colHdr;
    group.forEach(item=>{
      const s = getStatus(item);
      const pct = item.max>0 ? Math.round(item.qty/item.max*100) : 0;
      const barColor = s==='ok'?'#1D9E75':s==='low'?'#EF9F27':'#E24B4A';
      html += `<div class="row">
        <div class="item-info">
          <div class="name">${item.name}</div>
          <div class="ref">${item.ref}</div>
          <div style="margin-top:4px;background:var(--color-background-secondary);border-radius:3px;height:3px;width:100%;overflow:hidden">
            <div style="height:3px;width:${pct}%;background:${barColor};border-radius:3px;transition:width .3s"></div>
          </div>
        </div>
        <div class="qty-ctrl" style="justify-content:center">
          <button class="qb" onclick="changeQty(${item.id},-1)" aria-label="Decrease">−</button>
          <input type="number" class="qnum" value="${item.qty}" min="0" style="width:40px;text-align:center;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px;font-size:14px;font-weight:500;background:transparent;color:var(--color-text-primary)" onchange="setQtyDirect(${item.id},this.value)" aria-label="Quantity for ${item.name}"/>
          <button class="qb" onclick="changeQty(${item.id},1)" aria-label="Increase">+</button>
        </div>
        <div style="text-align:center">
          <input type="number" class="max-input" value="${item.max}" min="0" onchange="setMax(${item.id},this.value)" aria-label="Target for ${item.name}" style="border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-primary);text-align:center"/>
        </div>
        <div style="text-align:center"><span class="badge b-${s}">${statusLabel(s)}</span>${item.received?`<span class="badge b-rcv" style="margin-top:3px;display:inline-block">Received</span>`:''}</div>
        <div style="font-size:12px;color:var(--color-text-tertiary);text-align:center">${pct}%</div>
        <button class="del-btn" onclick="delItem(${item.id})" aria-label="Remove ${item.name}"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>`;
    });
    html += `</div>`;
  });

  if(!html) html = '<p class="empty">No items match your filters.</p>';
  document.getElementById('list').innerHTML = html;

  const ok = items.filter(i=>getStatus(i)==='ok').length;
  const low = items.filter(i=>getStatus(i)==='low').length;
  const out = items.filter(i=>getStatus(i)==='out').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-lbl">Total items</div><div class="stat-val">${items.length}</div></div>
    <div class="stat"><div class="stat-lbl">In stock</div><div class="stat-val s-ok">${ok}</div></div>
    <div class="stat"><div class="stat-lbl">Low stock</div><div class="stat-val s-low">${low}</div></div>
    <div class="stat"><div class="stat-lbl">Out of stock</div><div class="stat-val s-out">${out}</div></div>`;

  const logEl = document.getElementById('log');
  if(!log.length){ logEl.innerHTML='<p class="empty">No changes yet — adjustments will appear here.</p>'; return; }
  logEl.innerHTML = log.map(e=>`
    <div class="log-row">
      <span class="log-time">${fmtTime(e.time)}</span>
      <span class="log-name">${e.name} <span style="color:var(--color-text-tertiary);font-family:var(--font-mono);font-size:11px">${e.ref}</span></span>
      <span class="log-chg ${e.delta>0?'pos':'neg'}">${e.delta>0?'+':''}${e.delta}</span>
      <span class="log-new">${e.next}</span>
    </div>`).join('');
}

function exportCSV(){
  const rows=[['Session','Product','Ref code','In stock','Target qty','% full','Status','Received']];
  items.forEach(i=>{
    const pct = i.max>0?Math.round(i.qty/i.max*100):0;
    rows.push([i.cat,i.name,i.ref,i.qty,i.max,pct+'%',statusLabel(getStatus(i)),i.received?'Yes':'No']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='hands-on-inventory.csv';
  a.click();
}

render();
</script>
